name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm codegen
      - run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: roviq
          POSTGRES_PASSWORD: roviq_dev
          POSTGRES_DB: roviq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U roviq"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: nrwl/nx-set-shas@v4
      - uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-test-${{ github.sha }}
          restore-keys: |
            nx-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-test-
            nx-cache-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Set up database roles
        env:
          PGHOST: localhost
          PGPASSWORD: roviq_dev
        run: bash docker/init-db.sh
      - name: Push schema
        run: pnpm db:push
        env:
          DATABASE_URL: postgresql://roviq:roviq_dev@localhost:5432/roviq
      - name: Run affected tests
        run: pnpx nx affected -t test
        env:
          DATABASE_URL: postgresql://roviq_app:roviq_app_dev@localhost:5432/roviq?schema=public
          DATABASE_URL_ADMIN: postgresql://roviq_admin:roviq_admin_dev@localhost:5432/roviq?schema=public
          REDIS_URL: redis://localhost:6379
          NATS_URL: nats://localhost:4222
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
          JWT_EXPIRATION: 15m
          JWT_REFRESH_EXPIRATION: 7d

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E tests (Hurl + Vitest)
        run: docker compose -f docker/compose.e2e.yaml --profile hurl --profile vitest up --build --abort-on-container-exit
      - name: Teardown
        if: always()
        run: docker compose -f docker/compose.e2e.yaml --profile hurl --profile vitest down -v --remove-orphans

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: nrwl/nx-set-shas@v4
      - uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-build-${{ github.sha }}
          restore-keys: |
            nx-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-build-
            nx-cache-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm codegen
      - name: Build affected projects
        run: pnpx nx affected -t build
