name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate --schema=libs/prisma-client/prisma/schema.prisma
      - run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: roviq
          POSTGRES_PASSWORD: roviq_dev
          POSTGRES_DB: roviq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U roviq"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: nrwl/nx-set-shas@v4
      - run: pnpm install --frozen-lockfile
      - name: Set up database roles
        env:
          PGHOST: localhost
          PGPASSWORD: roviq_dev
        run: bash scripts/init-db.sh
      - run: npx prisma generate --schema=libs/prisma-client/prisma/schema.prisma
      - name: Run migrations
        run: npx prisma migrate deploy --schema=prisma/schema.prisma
        working-directory: libs/prisma-client
        env:
          DATABASE_URL: postgresql://roviq:roviq_dev@localhost:5432/roviq?schema=public
      - name: Run affected tests
        run: npx nx affected -t test
        env:
          DATABASE_URL: postgresql://roviq:roviq_dev@localhost:5432/roviq?schema=public
          DATABASE_URL_ADMIN: postgresql://roviq_admin:roviq_admin_dev@localhost:5432/roviq?schema=public
          REDIS_URL: redis://localhost:6379
          NATS_URL: nats://localhost:4222
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          JWT_EXPIRATION: 15m
          JWT_REFRESH_EXPIRATION: 7d

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: nrwl/nx-set-shas@v4
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate --schema=libs/prisma-client/prisma/schema.prisma
      - name: Build affected projects
        run: npx nx affected -t build
