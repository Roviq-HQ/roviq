name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - name: Check integration tests use real DB
        run: pnpm run test:check-integration
      - name: Check for ambiguous slash-separated date literals
        run: pnpm run test:check-dates

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm codegen
      - run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: roviq
          POSTGRES_PASSWORD: roviq_dev
          POSTGRES_DB: roviq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U roviq"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: nrwl/nx-set-shas@v4
      - uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-test-${{ github.sha }}
          restore-keys: |
            nx-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-test-
            nx-cache-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Set up database roles
        env:
          PGHOST: localhost
          PGPASSWORD: roviq_dev
        run: bash docker/init-db.sh
      - name: Run codegen (must be fresh before tests)
        run: pnpm codegen
      - name: Reset test database (push schema + roles + RLS + grants)
        run: pnpm db:reset --test
        env:
          DATABASE_URL_TEST_MIGRATE: postgresql://roviq:roviq_dev@localhost:5432/roviq_test
      - name: Run affected tests
        run: pnpx nx affected -t test
        env:
          DATABASE_URL: postgresql://roviq_pooler:roviq_pooler_dev@localhost:5432/roviq_test
          DATABASE_URL_MIGRATE: postgresql://roviq:roviq_dev@localhost:5432/roviq_test
          DATABASE_URL_AUDIT: postgresql://roviq:roviq_dev@localhost:5432/roviq_test
          DATABASE_URL_TEST: postgresql://roviq_pooler:roviq_pooler_dev@localhost:5432/roviq_test
          DATABASE_URL_TEST_MIGRATE: postgresql://roviq:roviq_dev@localhost:5432/roviq_test
          REDIS_URL: redis://localhost:6379
          NATS_URL: nats://localhost:4222
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
          JWT_EXPIRATION: 15m
          JWT_REFRESH_EXPIRATION: 7d
      - name: Security Invariant Tests (integration)
        run: pnpm test:int
        env:
          DATABASE_URL: postgresql://roviq_pooler:roviq_pooler_dev@localhost:5432/roviq_test
          DATABASE_URL_MIGRATE: postgresql://roviq:roviq_dev@localhost:5432/roviq_test
          DATABASE_URL_TEST: postgresql://roviq_pooler:roviq_pooler_dev@localhost:5432/roviq_test
          DATABASE_URL_TEST_MIGRATE: postgresql://roviq:roviq_dev@localhost:5432/roviq_test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: nrwl/nx-set-shas@v4
      - uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-build-${{ github.sha }}
          restore-keys: |
            nx-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-build-
            nx-cache-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm codegen
      - name: Build affected projects
        run: pnpx nx affected -t build

  e2e-api:
    name: E2E API (Vitest)
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - name: Start E2E stack
        run: docker compose -p roviq-e2e -f docker/compose.e2e.yaml up -d --build --wait
        timeout-minutes: 12
      - name: Vitest E2E API tests
        run: pnpm test:e2e:api
        env:
          API_URL: http://localhost:3004/api/graphql
          WS_URL: ws://localhost:3004/api/graphql
      - name: Show docker logs on failure
        if: failure()
        run: docker compose -p roviq-e2e -f docker/compose.e2e.yaml logs --tail=200
      - name: Stop E2E stack
        if: always()
        run: docker compose -p roviq-e2e -f docker/compose.e2e.yaml down -v

  e2e-ui:
    name: E2E UI (Playwright)
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Start E2E stack (api-gateway on :3004 only — Playwright spawns its own dev:web)
        run: docker compose -p roviq-e2e -f docker/compose.e2e.yaml up -d --build --wait
        timeout-minutes: 12
      - name: Run codegen (Next.js dev:web needs fresh GraphQL types)
        run: pnpm codegen
      - name: Playwright E2E tests
        run: pnpm test:e2e:ui
        env:
          # Playwright webServer reuses these — points API at the Docker stack
          API_URL: http://localhost:3004/api/graphql
          WS_URL: ws://localhost:3004/api/graphql
          NEXT_PUBLIC_API_URL: http://localhost:3004
          NEXT_PUBLIC_WS_URL: ws://localhost:3004
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/*/playwright-report/
          retention-days: 7
      - name: Show docker logs on failure
        if: failure()
        run: docker compose -p roviq-e2e -f docker/compose.e2e.yaml logs --tail=200
      - name: Stop E2E stack
        if: always()
        run: docker compose -p roviq-e2e -f docker/compose.e2e.yaml down -v
