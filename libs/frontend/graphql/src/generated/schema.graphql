"""
Guardian profile with occupation, joined display name, and linked students
"""
type GuardianModel {
  """Guardian profile creation timestamp (UTC)."""
  createdAt: DateTime!

  """Guardian job title inside their organisation (free text)."""
  designation: String

  """
  Guardian's highest completed education level — constrained enum mirroring the chk_education_level DB check.
  """
  educationLevel: GuardianEducationLevel

  """
  Guardian first name as an i18nText map. Always includes `en`; frontend resolves via useI18nField().
  """
  firstName: I18nText!
  gender: Gender

  """Guardian profile UUIDv7 — stable primary key."""
  id: ID!

  """
  Guardian last name as an i18nText map. Nullable because single-name cultures exist.
  """
  lastName: I18nText

  """
  Number of students linked to this guardian via student_guardian_links — precomputed to avoid an N+1 on the list page.
  """
  linkedStudentCount: Int!

  """
  Membership row linking this guardian to the current institute (tenant) and role.
  """
  membershipId: String!

  """
  Guardian occupation (free text, e.g. "Engineer", "Shopkeeper", "Homemaker").
  """
  occupation: String

  """Employer / organisation the guardian works at (free text)."""
  organization: String

  """
  Primary phone number (is_primary=true) surfaced for quick-dial and search. Null when the guardian has no phone on file.
  """
  primaryPhone: String

  """Absolute URL of the guardian profile photo, or null before any upload."""
  profileImageUrl: String

  """Most recent update timestamp (UTC)."""
  updatedAt: DateTime!

  """Underlying user account id — shared with other profile types."""
  userId: String!

  """
  Optimistic-concurrency version. Increments on every write; clients must send the expected value on update.
  """
  version: Int!
}

