type Mutation {
  activateAcademicYear(id: ID!): AcademicYearModel!
  activateInstitute(id: ID!): InstituteModel!
  activateInstituteGroup(id: ID!): InstituteGroupModel!
  addGroupMember(groupId: ID!, roleId: ID!, userId: ID!): GroupMembershipModel!
  addInstituteToGroup(groupId: ID!, instituteId: ID!): Boolean!

  """
  Delete a suspended reseller after 30-day grace period
  """
  adminDeleteReseller(resellerId: String!): Boolean!
  adminLogin(password: String!, username: String!): AuthPayload!

  """
  Suspend a reseller and revoke all staff sessions
  """
  adminSuspendReseller(resellerId: String!): Boolean!
  archiveAcademicYear(id: ID!): AcademicYearModel!
  archivePlan(id: ID!): SubscriptionPlanModel!
  assignPlanToInstitute(input: AssignPlanInput!): AssignPlanResult!
  assignSubjectToSection(sectionId: ID!, subjectId: ID!): Boolean!
  assignSubjectToStandard(standardId: ID!, subjectId: ID!): Boolean!
  cancelSubscription(input: ManageSubscriptionInput!): SubscriptionModel!
  createAcademicYear(input: CreateAcademicYearInput!): AcademicYearModel!
  createInstitute(input: CreateInstituteInput!): InstituteModel!
  createInstituteGroup(input: CreateInstituteGroupInput!): InstituteGroupModel!
  createSection(input: CreateSectionInput!): SectionModel!
  createStandard(input: CreateStandardInput!): StandardModel!
  createSubject(input: CreateSubjectInput!): SubjectModel!
  createSubscriptionPlan(input: CreatePlanInput!): SubscriptionPlanModel!
  deactivateInstitute(id: ID!): InstituteModel!
  deactivateInstituteGroup(id: ID!): InstituteGroupModel!
  deleteInstitute(id: ID!): Boolean!
  deleteInstituteGroup(id: ID!): Boolean!
  deletePlan(id: ID!): Boolean!
  deleteSection(id: ID!): Boolean!
  deleteStandard(id: ID!): Boolean!
  deleteSubject(id: ID!): Boolean!
  endImpersonation(sessionId: String!): Boolean!
  exchangeImpersonationCode(code: String!): ImpersonationAuthPayload!
  generatePasskeyAuthOptions(username: String): PasskeyAuthOptions!
  generatePasskeyRegistrationOptions(input: GeneratePasskeyRegistrationInput!): JSON!
  impersonateUser(reason: String!, targetUserId: String!): StartImpersonationResult!
  instituteLogin(password: String!, username: String!): InstituteLoginResult!
  logout: Boolean!
  pauseSubscription(subscriptionId: ID!): SubscriptionModel!
  refreshToken(token: String!): AuthPayload!
  register(input: RegisterInput!): AuthPayload!
  registerDeviceToken(token: String!): Boolean!
  rejectInstitute(id: ID!): InstituteModel!
  removeGroupMember(groupId: ID!, userId: ID!): Boolean!
  removeInstituteFromGroup(instituteId: ID!): Boolean!
  removePasskey(passkeyId: String!): Boolean!
  removeSubjectFromSection(sectionId: ID!, subjectId: ID!): Boolean!
  removeSubjectFromStandard(standardId: ID!, subjectId: ID!): Boolean!
  resellerLogin(password: String!, username: String!): AuthPayload!
  restoreInstitute(id: ID!): InstituteModel!
  restorePlan(id: ID!): SubscriptionPlanModel!
  resumeSubscription(subscriptionId: ID!): SubscriptionModel!
  revokeAllOtherSessions(currentRefreshToken: String!): Boolean!
  revokeSession(sessionId: String!): Boolean!
  selectInstitute(membershipId: String!, selectionToken: String!): AuthPayload!
  startImpersonation(
    reason: String!
    targetTenantId: String!
    targetUserId: String!
  ): StartImpersonationResult!
  suspendInstitute(id: ID!): InstituteModel!
  suspendInstituteGroup(id: ID!): InstituteGroupModel!
  switchInstitute(currentRefreshToken: String!, membershipId: String!): AuthPayload!
  updateAcademicYear(id: ID!, input: UpdateAcademicYearInput!): AcademicYearModel!
  updateInstituteGroup(id: ID!, input: UpdateInstituteGroupInput!): InstituteGroupModel!
  updateInstituteInfo(id: ID!, input: UpdateInstituteInfoInput!): InstituteModel!
  updateNotificationConfig(input: UpdateNotificationConfigInput!): NotificationConfigModel!
  updateSection(id: ID!, input: UpdateSectionInput!): SectionModel!
  updateStandard(id: ID!, input: UpdateStandardInput!): StandardModel!
  updateSubject(id: ID!, input: UpdateSubjectInput!): SubjectModel!
  updateSubscriptionPlan(id: ID!, input: UpdatePlanInput!): SubscriptionPlanModel!
  verifyImpersonationOtp(otp: String!, sessionId: String!): StartImpersonationResult!
  verifyPasskeyAuth(input: VerifyPasskeyAuthInput!): InstituteLoginResult!
  verifyPasskeyRegistration(input: VerifyPasskeyRegistrationInput!): PasskeyInfo!
}

