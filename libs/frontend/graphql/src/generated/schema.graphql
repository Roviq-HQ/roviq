"""
Per-student absentee report row — aggregates a student's attendance across all sessions in the requested date range.
"""
type AbsenteeReportItem {
  """Number of sessions marked ABSENT for this student."""
  absentCount: Int!

  """
  Sorted, distinct list of ISO YYYY-MM-DD dates on which the student was marked ABSENT.
  """
  absentDates: [String!]!

  """Number of sessions marked LATE for this student."""
  lateCount: Int!

  """Number of sessions marked LEAVE for this student."""
  leaveCount: Int!

  """Number of sessions marked PRESENT for this student."""
  presentCount: Int!

  """Student membership id."""
  studentId: ID!

  """
  Total number of attendance sessions this student had an entry in across the range.
  """
  totalSessions: Int!
}

