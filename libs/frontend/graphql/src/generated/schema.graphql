"""
Platform-admin input for creating a new institute. Supports assigning to a specific reseller and group.
"""
input AdminCreateInstituteInput {
  address: InstituteAddressInput
  board: BoardType

  """
  Short internal code for the institute, e.g. "SAJ". Unique per reseller.
  """
  code: String
  contact: InstituteContactInput

  """Education levels offered, e.g. [PRIMARY, UPPER_PRIMARY]."""
  departments: [EducationLevel!]

  """
  Institute group (trust, chain, or society) to assign this institute to.
  """
  groupId: String

  """
  Whether this is a demo/sandbox institute — excludes it from production reports.
  """
  isDemo: Boolean = false

  """
  Localised institute name, e.g. { en: "Sunrise Academy", hi: "सनराइज़ अकैडमी" }.
  """
  name: I18nText!

  """
  Reseller to assign this institute to. Defaults to the platform "Roviq Direct" reseller when omitted.
  """
  resellerId: String

  """
  URL-safe slug — globally unique, lowercase alphanumerics and hyphens, e.g. "sunrise-academy-jaipur".
  """
  slug: String!

  """Academic structure — NEP 2020 (5+3+3+4 stages) or legacy 10+2."""
  structureFramework: StructureFramework = TRADITIONAL
  type: InstituteType = SCHOOL
}

