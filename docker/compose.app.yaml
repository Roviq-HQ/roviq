services:
  postgres:
    image: postgres:16-alpine
    networks: [roviq-net]
    environment:
      POSTGRES_USER: roviq
      POSTGRES_PASSWORD: roviq_dev
      POSTGRES_DB: roviq
    volumes:
      - roviq-pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roviq"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    networks: [roviq-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    networks: [roviq-net]
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    networks: [roviq-net]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: roviq_minio
      MINIO_ROOT_PASSWORD: roviq_minio_dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    networks: [roviq-net]
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: roviq
      POSTGRES_PWD: roviq_dev
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    networks: [roviq-net]
    environment:
      TEMPORAL_ADDRESS: temporal:7233

  migrator:
    image: ghcr.io/roviq-hq/migrator:${ROVIQ_VERSION:-latest}
    networks: [roviq-net]
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgresql://roviq_app:roviq_app_dev@postgres:5432/roviq
      DATABASE_URL_MIGRATE: postgresql://roviq:roviq_dev@postgres:5432/roviq
      DATABASE_URL_ADMIN: postgresql://roviq_admin:roviq_admin_dev@postgres:5432/roviq
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    image: ghcr.io/roviq-hq/api-gateway:${ROVIQ_VERSION:-latest}
    networks: [roviq-net]
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgresql://roviq_app:roviq_app_dev@postgres:5432/roviq
      DATABASE_URL_ADMIN: postgresql://roviq_admin:roviq_admin_dev@postgres:5432/roviq
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: roviq_minio
      S3_SECRET_KEY: roviq_minio_dev
      S3_BUCKET_PREFIX: roviq-
      TEMPORAL_ADDRESS: temporal:7233
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      API_GATEWAY_PORT: 3000
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_RP_NAME: Roviq
      ALLOWED_ORIGINS: http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  web:
    image: ghcr.io/roviq-hq/web:${ROVIQ_VERSION:-latest}
    networks: [roviq-net]
    ports: ["4200:4200"]
    environment:
      PORT: 4200
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:3000
    depends_on:
      api-gateway:
        condition: service_started

  notification-service:
    image: ghcr.io/roviq-hq/notification-service:${ROVIQ_VERSION:-latest}
    networks: [roviq-net]
    ports: ["3001:3001"]
    environment:
      DATABASE_URL: postgresql://roviq_app:roviq_app_dev@postgres:5432/roviq
      DATABASE_URL_ADMIN: postgresql://roviq_admin:roviq_admin_dev@postgres:5432/roviq
      NATS_URL: nats://nats:4222
      NOVU_SECRET_KEY: ${NOVU_SECRET_KEY:-placeholder}
      NOVU_APP_ID: ${NOVU_APP_ID:-placeholder}
      NOTIFICATION_SERVICE_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

networks:
  roviq-net:

volumes:
  roviq-pgdata:
