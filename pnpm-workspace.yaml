packages:
  - 'libs/**'
  - 'ee/**'

allowBuilds:
  '@apollo/protobufjs': true
  '@firebase/util': true
  '@nestjs/core': true
  '@parcel/watcher': true
  '@swc/core': true
  better-sqlite3: false
  core-js-pure: false
  dtrace-provider: false
  esbuild: true
  less: false
  msw: true
  nx: true
  prisma: false
  protobufjs: false
  re2: false
  sharp: true
  unrs-resolver: true
